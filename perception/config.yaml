mcp_port: 15720

plugins:
  asr:
    enabled: true
    provider: openai    # openai | openai_omni
    url: ""
    key: ""
    model: ""
    language: zh-CN
    vad:
      model: silero       # silero | webrtc | ""(disabled)
      threshold: 0.5
      silence_ms: 400

  tts:
    enabled: true
    provider: aliyun    # aliyun | doubao
    # Aliyun
    app_key: ""
    ak_id: ""
    ak_secret: ""
    voice: ""
    rate: 0
    pitch: 0
    # Doubao
    api_key: ""
    api_secret: ""
    cluster: ""

  htmsg:
    enabled: true
    namespace: ""       # auto-detect from hostname if empty
    keyframe:
      dist_thresh: 1.0    # meters — insert keyframe when moved this far
      angle_thresh: 0.35  # radians (~20°) — or rotated this much
    semantic:
      model: "mobileclip"
      sam_model: "sam2_tiny"
      confidence_decay: 0.95
    graph:
      db_path: "/opt/phanthy-motus/data/htmsg"
      max_nodes: 500
