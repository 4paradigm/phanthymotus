services:

  # ── Layer 2: Perception Stack（感知层）────────────────────────────────────
  perception-stack:
    build:
      context: ./src/perception_stack
      dockerfile: Dockerfile
    network_mode: host     # 需要访问 ROS2 DDS；15720/15721 直接绑定到宿主机
    environment:
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    volumes:
      - ./src/perception_stack/config.yaml:/work/config.yaml:ro
    restart: unless-stopped

  # ── Layer 3: Agent Core（大脑层）─────────────────────────────────────────
  agent-core:
    build:
      context: ./src/agent_core
      dockerfile: Dockerfile
    network_mode: host     # 需要访问 ROS2 DDS；0.0.0.0:15678 直接绑定到宿主机
    env_file: .env
    environment:
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - perception-stack
    restart: unless-stopped
